<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พญายักษ์วัดแจ้ง - PBR + Bloom (Fixed Again)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', sans-serif; }
        #ui-info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px;
            z-index: 10;
            border-left: 4px solid gold;
        }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: white; display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
<!-- Three.js core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- examples dependencies ตามลำดับ -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<!-- required base pass for postprocessing examples -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/Pass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SceneUtils.js"></script>
<!-- dat.gui for runtime controls -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
</head>
<body>
    <div id="loading">กำลังโหลด...</div>
    <div id="ui-info">
        <h1>🗿 พญายักษ์วัดแจ้ง (PBR+Bloom)</h1>
        <p>ทศกัณฐ์ (เขียว) | สหัสเดชะ (ขาว)</p>
    </div>

    <script>
        // ซ่อน loading เมื่อ everything พร้อม
        setTimeout(() => document.getElementById('loading').style.display = 'none', 1000);

        // ==================== ค่าคงที่ ====================
        const THEME = {
            COLORS: {
                GIANT_GREEN: 0x2E4600, // เขียวไพร (ตามคำขอ)
                GIANT_WHITE: 0xf0f0f0,
                GOLD: 0xffaa00,
                NIGHT_BG: 0x0a0a0a
            }
        };

        const settings = {
            footAngle: 180,
            squatOffset: 0.85,
            clubLength: 2.6,
            clubZ: 1.1,
            showAxes: true,
            showJewelry: true,
            bloomStrength: 1.2,
            bloomRadius: 0.4,
            bloomThreshold: 0.85
        };

        // detect mobile early for segment/quality choices
        const IS_MOBILE = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.matchMedia('(pointer:coarse)').matches;

        // segment counts for geometry (lower on mobile)
        const SEG = {
            sphere: IS_MOBILE ? 8 : 16,
            smallSphere: IS_MOBILE ? 8 : 12,
            torsoRadial: IS_MOBILE ? 8 : 12,
            cylinderRadial: IS_MOBILE ? 8 : 12,
            torusRadial: IS_MOBILE ? 12 : 16,
            torusTubular: IS_MOBILE ? 12 : 24,
            circleSegments: IS_MOBILE ? 16 : 32
        };

        // ==================== BaseGiant ====================
        class BaseGiant {
            constructor(skinColor, name, envMap) {
                this.name = name;
                this.container = new THREE.Group();
                this.mainMesh = new THREE.Group();
                this.container.add(this.mainMesh);

                // สร้าง material พร้อม envMap
                this.materials = {
                    skin: new THREE.MeshStandardMaterial({ 
                        color: skinColor, 
                        roughness: 0.5, 
                        metalness: 0.0,
                        envMap: envMap,
                        envMapIntensity: 0.8
                    }),
                    gold: new THREE.MeshStandardMaterial({ 
                        color: THEME.COLORS.GOLD, 
                        roughness: 0.15, 
                        metalness: 1.0,
                        envMap: envMap,
                        envMapIntensity: 1.5
                    }),
                    weapon: new THREE.MeshStandardMaterial({ 
                        color: 0xcccccc, 
                        roughness: 0.3, 
                        metalness: 0.8,
                        envMap: envMap,
                        envMapIntensity: 1.2
                    })
                };

                this._feet = { left: null, right: null };
                this._jewelryItems = [];
                this._clubGroup = new THREE.Group();
                this._clubAdded = false; // ใช้ตรวจสอบว่าเพิ่ม clubGroup เข้า container แล้วหรือยัง
            }

            build() {
                this.createLegs();
                this.createBody();
                this.createArms();
                this.createHead();
                this.createWeapon(); // สร้างอาวุธ
                this.createOrnaments();
                this.mainMesh.position.y = settings.squatOffset;
            }

            setPosition(x, y, z) {
                this.container.position.set(x, y, z);
            }

            createBody() {
                const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.7, 1.8, SEG.torsoRadial), this.materials.skin);
                torso.position.y = 1.6;
                this.mainMesh.add(torso);
            }

            createOrnaments() {
                const sWidth = 0.65;
                const leftShoulder = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.12, 0.6), this.materials.gold);
                leftShoulder.position.set(-sWidth, 2.4, 0.05);
                leftShoulder.rotation.z = Math.PI / 6;
                
                const rightShoulder = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.12, 0.6), this.materials.gold);
                rightShoulder.position.set(sWidth, 2.4, 0.05);
                rightShoulder.rotation.z = -Math.PI / 6;

                const tabSuang = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.1), this.materials.gold);
                tabSuang.rotation.z = Math.PI / 4;
                tabSuang.position.set(0, 2.1, 0.6);
                
                this.mainMesh.add(leftShoulder, rightShoulder, tabSuang);
            }

            createArm(side) {
                const isLeft = side === 'left';
                const sWidth = 0.65;
                const armGroup = new THREE.Group();
                armGroup.position.set(isLeft ? -sWidth : sWidth, 2.35, 0.05);

                const upperArmLen = 0.85;
                const upperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.15, upperArmLen, SEG.cylinderRadial), this.materials.skin);
                upperArm.position.y = -upperArmLen / 2;
                const upperContainer = new THREE.Group();
                upperContainer.add(upperArm);
                armGroup.add(upperContainer);

                const forearmLen = 0.9;
                const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.13, forearmLen, SEG.cylinderRadial), this.materials.skin);
                forearm.position.y = -forearmLen / 2;
                const forearmContainer = new THREE.Group();
                forearmContainer.add(forearm);
                forearmContainer.position.y = -upperArmLen;
                upperContainer.add(forearmContainer);

                const hand = new THREE.Mesh(new THREE.SphereGeometry(0.17, SEG.smallSphere, SEG.smallSphere), this.materials.skin);
                hand.position.y = -forearmLen;
                forearmContainer.add(hand);

                // เครื่องประดับ
                const armBand = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.04, SEG.torusRadial, SEG.torusTubular), this.materials.gold);
                armBand.rotation.x = Math.PI / 2;
                armBand.position.y = -upperArmLen * 0.3;
                upperContainer.add(armBand);
                this._jewelryItems.push(armBand);

                const elbowRing = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.05, SEG.torusRadial, SEG.torusTubular), this.materials.gold);
                elbowRing.rotation.x = Math.PI / 2;
                elbowRing.position.y = -upperArmLen;
                upperContainer.add(elbowRing);
                this._jewelryItems.push(elbowRing);

                const wristRing = new THREE.Mesh(new THREE.TorusGeometry(0.19, 0.04, SEG.torusRadial, SEG.torusTubular), this.materials.gold);
                wristRing.rotation.x = Math.PI / 2;
                wristRing.position.y = -forearmLen;
                forearmContainer.add(wristRing);
                this._jewelryItems.push(wristRing);

                upperContainer.rotation.z = isLeft ? 0.3 : -0.3;
                upperContainer.rotation.x = -0.5;
                forearmContainer.rotation.x = -1.3;
                forearmContainer.rotation.y = isLeft ? 1.5 : -1.5;

                return armGroup;
            }

            createArms() {
                this.mainMesh.add(this.createArm('left'), this.createArm('right'));
            }

            createSingleLeg(isLeft) {
                const legRoot = new THREE.Group();
                legRoot.position.set(isLeft ? -0.3 : 0.3, 0.9, 0);

                const upperLegLen = 1.1;
                const upperLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.3, upperLegLen, SEG.cylinderRadial), this.materials.skin);
                upperLeg.position.y = -upperLegLen / 2;
                const upperContainer = new THREE.Group();
                upperContainer.add(upperLeg);
                legRoot.add(upperContainer);

                const lowerLegLen = 0.95;
                const lowerLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.22, lowerLegLen, SEG.cylinderRadial), this.materials.skin);
                lowerLeg.position.y = -lowerLegLen / 2;
                const lowerContainer = new THREE.Group();
                lowerContainer.add(lowerLeg);
                lowerContainer.position.y = -upperLegLen;
                upperContainer.add(lowerContainer);

                const footGroup = new THREE.Group();
                const footBase = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.25, 0.4), this.materials.gold);
                footBase.position.x = isLeft ? -0.45 : 0.45;
                const footTip = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.4), this.materials.gold);
                footTip.position.set(isLeft ? -0.9 : 0.9, 0.1, 0);
                footTip.rotation.z = isLeft ? Math.PI/6 : -Math.PI/6;
                footGroup.add(footBase, footTip);
                footGroup.position.set(0, -lowerLegLen, 0);
                lowerContainer.add(footGroup);
                
                if (isLeft) this._feet.left = footGroup;
                else this._feet.right = footGroup;

                const thighBand = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.05, SEG.torusRadial, SEG.torusTubular), this.materials.gold);
                thighBand.rotation.x = Math.PI / 2;
                thighBand.position.y = -upperLegLen * 0.4;
                upperContainer.add(thighBand);
                this._jewelryItems.push(thighBand);

                const kneeRing = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.06, SEG.torusRadial, SEG.torusTubular), this.materials.gold);
                kneeRing.rotation.x = Math.PI / 2;
                kneeRing.position.y = -upperLegLen;
                upperContainer.add(kneeRing);
                this._jewelryItems.push(kneeRing);

                const ankleRing = new THREE.Mesh(new THREE.TorusGeometry(0.27, 0.05, SEG.torusRadial, SEG.torusTubular), this.materials.gold);
                ankleRing.rotation.x = Math.PI / 2;
                ankleRing.position.y = -lowerLegLen;
                lowerContainer.add(ankleRing);
                this._jewelryItems.push(ankleRing);

                upperContainer.rotation.z = isLeft ? 1.1 : -1.1;
                upperContainer.rotation.x = -0.3;
                lowerContainer.rotation.z = isLeft ? -0.8 : 0.8;
                lowerContainer.rotation.x = 0.5;

                return legRoot;
            }

            createLegs() {
                this.mainMesh.add(this.createSingleLeg(true), this.createSingleLeg(false));
            }

            createWeapon() {
                // ล้างของเก่าใน _clubGroup (r128 ไม่มี .clear() ต้องล้างทีละตัว)
                while(this._clubGroup.children.length > 0) {
                    this._clubGroup.remove(this._clubGroup.children[0]);
                }
                
                const clubBody = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.22, 0.32, settings.clubLength, SEG.cylinderRadial),
                    this.materials.weapon
                );
                clubBody.position.y = settings.clubLength / 2;

                const handle = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.12, 0.12, 0.6, SEG.cylinderRadial),
                    this.materials.weapon
                );
                handle.position.y = settings.clubLength + 0.3;

                const topGold = new THREE.Mesh(
                    new THREE.SphereGeometry(0.2, SEG.sphere, SEG.sphere),
                    this.materials.gold
                );
                topGold.scale.y = 1.5;
                topGold.position.y = settings.clubLength + 0.6 + 0.1;

                this._clubGroup.add(clubBody, handle, topGold);
                this._clubGroup.position.set(0, 0, settings.clubZ);
                
                // เพิ่ม clubGroup เข้า container ถ้ายังไม่เคยเพิ่ม
                if (!this._clubAdded) {
                    this.container.add(this._clubGroup);
                    this._clubAdded = true;
                }
            }

            update(time) {
                this.mainMesh.position.y = settings.squatOffset + Math.sin(time * 1.5) * 0.005;
                
                const sideAngle = (settings.footAngle / 2) * (Math.PI / 180);
                if (this._feet.left) this._feet.left.rotation.y = sideAngle;
                if (this._feet.right) this._feet.right.rotation.y = -sideAngle;

                this._jewelryItems.forEach(item => item.visible = settings.showJewelry);
            }

            addTo(scene) {
                scene.add(this.container);
            }
        }

        // ==================== ทศกัณฐ์ ====================
        class Tossakan extends BaseGiant {
            constructor(envMap) { super(THEME.COLORS.GIANT_GREEN, "ทศกัณฐ์", envMap); this.build(); }
            createHead() {
                const headGroup = new THREE.Group();
                headGroup.position.y = 2.95;
                const face = new THREE.Mesh(new THREE.SphereGeometry(0.52, SEG.sphere, SEG.sphere), this.materials.skin);
                const crown = new THREE.Mesh(new THREE.ConeGeometry(0.25, 2.2, SEG.cylinderRadial), this.materials.gold);
                crown.position.y = 1.1;
                headGroup.add(face, crown);
                this.mainMesh.add(headGroup);
            }
        }

        // ==================== สหัสเดชะ ====================
        class Sahatsadecha extends BaseGiant {
            constructor(envMap) { super(THEME.COLORS.GIANT_WHITE, "สหัสเดชะ", envMap); this.build(); }
            createHead() {
                const headGroup = new THREE.Group();
                headGroup.position.y = 2.95;
                const face = new THREE.Mesh(new THREE.SphereGeometry(0.52, SEG.sphere, SEG.sphere), this.materials.skin);
                const crown = new THREE.Group();
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.42, 0.8, SEG.cylinderRadial), this.materials.gold);
                base.position.y = 0.5;
                const top = new THREE.Mesh(new THREE.ConeGeometry(0.25, 1.4, SEG.cylinderRadial), this.materials.gold);
                top.position.y = 1.4;
                crown.add(base, top);
                headGroup.add(face, crown);
                this.mainMesh.add(headGroup);
            }
        }

        // ==================== Main App ====================
        class App {
            constructor() {
                this.init();
                this.setupGUI();
                this.animate();
            }

            init() {
                // detect mobile / coarse-pointer devices and store flag (instance-level)
                this.isMobile = IS_MOBILE;

                // WebGL availability check (fallback message if not supported)
                const testCanvas = document.createElement('canvas');
                const gl = testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl');
                if (!gl) {
                    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#111;color:#fff;font-family:sans-serif;padding:20px;text-align:center;">เบราว์เซอร์ของคุณไม่รองรับ WebGL<br><small>โปรดลองบนอุปกรณ์/เบราว์เซอร์ที่รองรับ WebGL</small></div>';
                    return;
                }

                // Scene
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(THEME.COLORS.NIGHT_BG);

                // === สร้าง Environment Map แบบง่าย (ใช้ Canvas) ===
                const envSize = this.isMobile ? 256 : 512;
                const canvas = document.createElement('canvas');
                canvas.width = envSize;
                canvas.height = envSize;
                const ctx = canvas.getContext('2d');
                const grd = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grd.addColorStop(0, '#ffaa33');
                grd.addColorStop(0.5, '#3355aa');
                grd.addColorStop(1, '#221133');
                ctx.fillStyle = grd;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const envTexture = new THREE.CanvasTexture(canvas);
                envTexture.mapping = THREE.EquirectangularReflectionMapping; // เปลี่ยนเป็น environment map

                // ตั้งค่า scene.environment (r128 รองรับ)
                this.scene.environment = envTexture;

                // Camera
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(4, 5, 12);
                this.camera.lookAt(0, 2, 0);

                // Renderer
                this.renderer = new THREE.WebGLRenderer({ antialias: !this.isMobile });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, this.isMobile ? 1 : 1.5));
                this.renderer.toneMapping = THREE.ReinhardToneMapping;
                this.renderer.toneMappingExposure = this.isMobile ? 1.0 : 1.6;
                document.body.appendChild(this.renderer.domElement);

                // Controls
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.target.set(0, 2.5, 0);

                // แสง
                const ambient = new THREE.AmbientLight(0xffffff, 0.9);
                this.scene.add(ambient);

                const keyLight = new THREE.PointLight(0xfff7e8, 2.2, 30);
                keyLight.position.set(3, 10, 6);
                this.scene.add(keyLight);

                const fillLight = new THREE.PointLight(0x88aaff, 1.4, 30);
                fillLight.position.set(-4, 4, 8);
                this.scene.add(fillLight);

                const backLight = new THREE.PointLight(0xaa66cc, 0.6, 20);
                backLight.position.set(0, 2, -8);
                this.scene.add(backLight);

                // พื้น
                const floorGeo = new THREE.CircleGeometry(15, SEG.circleSegments);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7, metalness: 0.1 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.position.y = 0;
                // hide floor to show only axis helper as requested
                floor.visible = false;
                this.scene.add(floor);

                // กริด
                const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
                gridHelper.position.y = 0.01;
                // hide grid so only axes helper is displayed
                gridHelper.visible = false;
                this.scene.add(gridHelper);

                // สร้างยักษ์ (ส่ง envTexture ให้ใช้)
                this.tossakan = new Tossakan(envTexture);
                this.tossakan.setPosition(-3.2, 0, 0);
                this.tossakan.addTo(this.scene);

                this.sahatsa = new Sahatsadecha(envTexture);
                this.sahatsa.setPosition(3.2, 0, 0);
                this.sahatsa.addTo(this.scene);

                this.giants = [this.tossakan, this.sahatsa];

                // Axes helper (เพื่อ debug ว่ามี scene หรือไม่)
                const axesSize = 5;
                this.axesHelper = new THREE.AxesHelper(axesSize);
                this.axesHelper.renderOrder = 999;
                this.axesHelper.visible = settings.showAxes;
                this.scene.add(this.axesHelper);

                // small helper labels at axis ends: X, Y, Z
                const createAxisLabel = (text, color) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 128; canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle = color;
                    ctx.font = 'bold 40px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, canvas.width/2, canvas.height/2);
                    const tex = new THREE.CanvasTexture(canvas);
                    const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
                    const spr = new THREE.Sprite(mat);
                    spr.scale.set(0.7, 0.35, 1);
                    return spr;
                };

                this.xLabel = createAxisLabel('X', '#ff3333');
                this.xLabel.position.set(axesSize + 0.4, 0, 0);
                this.yLabel = createAxisLabel('Y', '#33ff33');
                this.yLabel.position.set(0, axesSize + 0.4, 0);
                this.zLabel = createAxisLabel('Z', '#3399ff');
                this.zLabel.position.set(0, 0, axesSize + 0.4);
                this.xLabel.visible = settings.showAxes;
                this.yLabel.visible = settings.showAxes;
                this.zLabel.visible = settings.showAxes;
                this.scene.add(this.xLabel, this.yLabel, this.zLabel);

                // === Post-processing (Bloom) ===
                this.composer = new THREE.EffectComposer(this.renderer);
                const renderPass = new THREE.RenderPass(this.scene, this.camera);
                this.composer.addPass(renderPass);

                this.bloomPass = new THREE.UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    settings.bloomStrength,
                    settings.bloomRadius,
                    settings.bloomThreshold
                );
                // disable or tone-down bloom for mobile devices
                if (this.isMobile) {
                    this.bloomPass.enabled = false;
                    this.bloomPass.strength = Math.min(settings.bloomStrength, 0.6);
                } else {
                    this.bloomPass.enabled = true;
                }
                this.composer.addPass(this.bloomPass);

                window.addEventListener('resize', () => this.onResize());

                // ซ่อน loading
                document.getElementById('loading').style.display = 'none';
            }

            setupGUI() {
                this.gui = new dat.GUI();
                const gui = this.gui;
                gui.add(settings, 'footAngle', 0, 270).name('กางเท้า (องศา)');
                gui.add(settings, 'squatOffset', 0.5, 1.1).name('ย่อตัว');
                gui.add(settings, 'clubLength', 2.0, 3.5).name('ความยาวกระบอง').onChange(() => this.rebuildWeapons());
                gui.add(settings, 'clubZ', 0.5, 2.0).name('ตำแหน่งกระบอง Z').onChange(() => this.updateClubZ());
                gui.add(settings, 'showJewelry', true).name('แสดงเครื่องประดับ');
                
                const bloomFolder = gui.addFolder('Bloom Effect');
                bloomFolder.add(settings, 'bloomStrength', 0, 3).name('ความเข้ม').onChange(v => this.bloomPass.strength = v);
                bloomFolder.add(settings, 'bloomRadius', 0, 1).name('รัศมี').onChange(v => this.bloomPass.radius = v);
                bloomFolder.add(settings, 'bloomThreshold', 0, 1).name('เกณฑ์ความสว่าง').onChange(v => this.bloomPass.threshold = v);
                bloomFolder.open();
                gui.add(settings, 'showAxes').name('แสดงแกน X/Y/Z').onChange(v => {
                    if (this.axesHelper) this.axesHelper.visible = v;
                    if (this.xLabel) this.xLabel.visible = v;
                    if (this.yLabel) this.yLabel.visible = v;
                    if (this.zLabel) this.zLabel.visible = v;
                });

                // hide dat.GUI on small / touch devices to avoid covering the canvas
                if (this.isMobile) {
                    try { this.gui.domElement.style.display = 'none'; } catch (e) {}

                    // create small overlay toggle button to show/hide GUI
                    const btn = document.createElement('button');
                    btn.textContent = '\u2699'; // gear
                    btn.title = 'Toggle GUI';
                    btn.style.position = 'absolute';
                    btn.style.right = '12px';
                    btn.style.top = '12px';
                    btn.style.zIndex = 200;
                    btn.style.width = '44px';
                    btn.style.height = '44px';
                    btn.style.borderRadius = '8px';
                    btn.style.background = 'rgba(0,0,0,0.6)';
                    btn.style.color = 'white';
                    btn.style.fontSize = '20px';
                    btn.style.backdropFilter = 'blur(4px)';
                    btn.style.border = '1px solid rgba(255,255,255,0.08)';
                    document.body.appendChild(btn);
                    btn.addEventListener('click', () => {
                        try {
                            const el = this.gui.domElement;
                            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
                        } catch (e) {}
                    });
                }
            }

            rebuildWeapons() {
                this.giants.forEach(g => g.createWeapon());
            }

            updateClubZ() {
                this.giants.forEach(g => g._clubGroup.position.z = settings.clubZ);
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.composer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const time = performance.now() * 0.001;
                this.giants.forEach(g => g.update(time));
                this.controls.update();
                this.composer.render();
            }
        }

        window.onload = () => { new App(); };
    </script>
</body>
</html>
